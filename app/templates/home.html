{% extends "base.html" %}
{% block title %}Home - MyApp{% endblock %}

{% block body %}
<div style="text-align: center; padding: 4rem 0;">
    <h1>Welcome to MyApp</h1>
    <p style="font-size: 1.125rem; color: var(--color-text-secondary); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
        A modern, secure platform for user authentication and account management.
    </p>
    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
        <a href="{{ url_for('auth.sign_up') }}" class="btn btn-primary btn-lg">Create Account</a>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary btn-lg">Sign In</a>
    </div>
</div>
{% endblock %}
